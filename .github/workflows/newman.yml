name: Newman Contract Tests

on:
  push:
    branches: [ "main" ]

jobs:
  newman:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          npm install
          npm install -g @stoplight/prism-cli

      - name: Start Prism mock servers
        run: |
          # Chạy IoT Mock ở cổng 4010
          nohup prism mock contracts/iot-ingestion.openapi.yaml -p 4010 > prism-iot.log 2>&1 &
          # Chạy AI Vision Mock ở cổng 4011
          nohup prism mock contracts/ai-vision.openapi.yaml -p 4011 > prism-vision.log 2>&1 &
          # Đợi server khởi động hoàn tất
          sleep 10

      - name: Run Newman tests
        run: |
          newman run postman/collections/FIT4110_lab03_iot_ingestion.postman_collection.json \
          -e postman/environments/FIT4110_lab03_mock.postman_environment.json \
          --reporters cli,junit \
          --reporter-junit-export reports/newman-report-mock.xml

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: reports/