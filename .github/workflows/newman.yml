name: Newman Contract Tests

on: [push]

jobs:
  newman:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Set up job
        run: echo "Starting setup"
      - name: 2. Checkout repository
        uses: actions/checkout@v4
      - name: 3. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: 4. Install dependencies
        run: npm install && npm install -g @stoplight/prism-cli
      - name: 5. Lint OpenAPI contracts
        run: npm run lint # Giả định bạn có lệnh này trong package.json
      - name: 6. Start Prism mock servers
        run: |
          nohup prism mock contracts/iot-ingestion.openapi.yaml -p 4010 > prism-iot.log 2>&1 &
          nohup prism mock contracts/ai-vision.openapi.yaml -p 4011 > prism-vision.log 2>&1 &
      - name: 7. Wait for mock servers
        run: sleep 10
      - name: 8. Smoke check mock servers
        run: curl http://localhost:4010/health && curl http://localhost:4011/health
      - name: 9. Run Newman contract tests
        run: newman run postman/collections/FIT4110_lab03_iot_ingestion.postman_collection.json -e postman/environments/FIT4110_lab03_mock.postman_environment.json --reporters cli,junit --reporter-junit-export reports/newman-report-mock.xml
      - name: 10. Show Prism logs on failure
        if: failure()
        run: cat prism-iot.log prism-vision.log
      - name: 11. Upload Newman reports
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: reports/
      - name: 12. Post Setup Node.js
        run: echo "Cleaning up Node environment"
      - name: 13. Post Checkout repository
        run: echo "Cleaning up repo files"
      - name: 14. Complete job
        run: echo "Pipeline completed successfully"