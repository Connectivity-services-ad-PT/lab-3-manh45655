openapi: 3.1.0
info:
  title: API Gateway & Notification Service - Nhóm 7A (productA) [Lab 02]
  version: 1.0.0
  description: |
    ### TÀI LIỆU HỢP ĐỒNG THIẾT KẾ API (API CONTRACT) - BÀI TẬP PHÁT TRIỂN LAB 02
  contact:
    name: Nguyễn Trung Kiên
    email: kien.nt.7a@example.edu.vn
servers:
  - url: http://localhost:4010
  - url: https://api.campus.local

tags:
  - name: health
  - name: alerts
  - name: events

security:
  - bearerAuth: []

paths:
  /health:
    get:
      operationId: getHealth
      tags: [health]
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'

  /alerts:
    post:
      operationId: createAlert
      tags: [alerts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAlertRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alert'
    get:
      operationId: listAlerts
      tags: [alerts]
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertPage'

  /alerts/recent:
    get:
      operationId: getRecentAlerts
      tags: [alerts]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Alert'

  /alerts/{alertId}:
    get:
      operationId: getAlertById
      tags: [alerts]
      parameters:
        - $ref: '#/components/parameters/AlertId'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alert'

  /events:
    post:
      operationId: createCampusEvent
      tags: [events]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CampusEvent'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventAccepted'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    AlertId:
      name: alertId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Cursor:
      name: cursor
      in: query
      schema:
        type: [string, "null"]
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 20

  schemas:
    HealthStatus:
      type: object
      required: [status, service, time]
      properties:
        status: {type: string}
        service: {type: string}
        time: {type: string, format: date-time}

    CreateAlertRequest:
      type: object
      required: [sourceService, alertType, severity, message]
      properties:
        sourceService: {type: string}
        alertType: {type: string}
        severity: {type: string}
        message: {type: string}
        relatedEventId:
          type: [string, "null"]
          format: uuid

    Alert:
      allOf:
        - $ref: '#/components/schemas/CreateAlertRequest'
        - type: object
          required: [id, status, createdAt]
          properties:
            id: {type: string, format: uuid}
            status: {type: string}
            createdAt: {type: string, format: date-time}
            resolvedAt:
              type: [string, "null"]
              format: date-time

    AlertPage:
      type: object
      required: [items, nextCursor, hasMore]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Alert'
        nextCursor:
          type: [string, "null"]
        hasMore: {type: boolean}

    CampusEvent:
      type: object
      properties:
        eventType: {type: string}

    EventAccepted:
      type: object
      properties:
        eventId: {type: string, format: uuid}
        acceptedAt: {type: string, format: date-time}

    Problem:
      type: object
      required: [type, title, status]
      properties:
        type: {type: string, format: uri}
        title: {type: string}
        status: {type: integer}
        detail:
          type: [string, "null"]
        instance:
          type: [string, "null"]
          format: uri
        errors:
          type: array
          items:
            type: object