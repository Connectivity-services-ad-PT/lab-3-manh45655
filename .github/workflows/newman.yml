name: Newman Contract Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  newman:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Lint OpenAPI contracts
        run: npm run lint:contracts

      - name: Start Prism mock servers
        run: |
          npm install -g @stoplight/prism-cli
          # Chạy với --multas để tránh lỗi xung đột, và ghi lại log lỗi chính xác
          nohup prism mock contracts/iot-ingestion.openapi.yaml -p 4010 --host 0.0.0.0 > prism-iot.log 2>&1 &
          nohup prism mock contracts/ai-vision.openapi.yaml -p 4011 --host 0.0.0.0 > prism-vision.log 2>&1 &
          # Đợi 10 giây để đảm bảo server đã khởi tạo xong
          sleep 10

      - name: Run Newman contract tests
        run: npm run test:mock

      - name: Show Prism logs on failure
        if: always() # Luôn chạy để bạn kiểm tra lỗi nếu có
        run: |
          echo "--- LOG IOT ---"
          cat prism-iot.log
          echo "--- LOG VISION ---"
          cat prism-vision.log

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: reports/