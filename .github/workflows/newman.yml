name: Newman Contract Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  newman:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Lint OpenAPI contracts
        run: npm run lint:contracts

      - name: Start and Wait for Prism mock servers
        run: |
          # 1. Cài đặt Prism
          npm install -g @stoplight/prism-cli
          
          # 2. Khởi động Mock Servers trong nền (background)
          # Sử dụng > prism.log 2>&1 để lưu log nếu cần kiểm tra lỗi
          prism mock contracts/iot-ingestion.openapi.yaml -p 4010 --host 0.0.0.0 > prism-iot.log 2>&1 &
          prism mock contracts/ai-vision.openapi.yaml -p 4011 --host 0.0.0.0 > prism-vision.log 2>&1 &
          
          # 3. Đợi server sẵn sàng tại cổng 4010 và 4011
          npx wait-on http://localhost:4010/health http://localhost:4011/health --timeout 45000

      - name: Run Newman contract tests
        run: npm run test:mock

      - name: Show Prism logs on failure
        if: failure()
        run: |
          echo "--- Prism IoT Log ---"
          cat prism-iot.log || true
          echo "--- Prism Vision Log ---"
          cat prism-vision.log || true

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: reports/