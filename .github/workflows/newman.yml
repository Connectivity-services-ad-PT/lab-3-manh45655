name: Newman Contract Tests

on: [push]

jobs:
  newman:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Set up job
        run: echo "Initializing environment"
      
      - name: 2. Checkout repository
        uses: actions/checkout@v4
      
      - name: 3. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      
      - name: 4. Install dependencies
        run: npm install
      
      - name: 5. Lint OpenAPI contracts
        run: npm run lint:contracts
      
      - name: 6. Start Prism mock servers
        run: |
          nohup npm run mock:iot > prism-iot.log 2>&1 &
          nohup npm run mock:vision > prism-vision.log 2>&1 &
      
      - name: 7. Wait for mock servers
        run: sleep 10
      
      - name: 8. Smoke check mock servers
        run: |
          # Kiểm tra xem server có đang lắng nghe ở cổng 4010 và 4011 không
          curl -f http://localhost:4010/health || echo "IoT Mock not reachable"
          curl -f http://localhost:4011/health || echo "AI Vision Mock not reachable"
      
      - name: 9. Run Newman contract tests
        run: npm run test:mock
      
      - name: 10. Show Prism logs on failure
        if: failure()
        run: |
          cat prism-iot.log
          cat prism-vision.log
      
      - name: 11. Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: reports/
      
      - name: 12. Post Setup Node.js
        run: echo "Post-setup completed"
      
      - name: 13. Post Checkout repository
        run: echo "Cleaning up"
      
      - name: 14. Complete job
        run: echo "Pipeline finished successfully"